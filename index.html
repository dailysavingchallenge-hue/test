<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දිනපතා ඉතිරුම් අභියෝගය | Daily Saving Challenge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 📌 Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Sinhala', 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 1) 100%);
        }

        #app-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        /* HEADER */
        .header-section { padding: 30px 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.1); }
        .main-title { font-size: clamp(1.2rem, 4vw, 2.8rem); font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--secondary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* LIVE TOTAL */
        .live-total-container { display: flex; justify-content: center; margin-bottom: 40px; }
        .live-total { display: inline-flex; align-items: center; gap: 15px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--glass-border); padding: 20px 40px; border-radius: var(--radius-xl); font-size: 1.8rem; font-weight: 700; backdrop-filter: blur(20px); }
        .live-total .amount { color: var(--accent); }

        /* 📌 NEW IMAGE SCRATCH CARDS SECTION */
        .scratch-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .scratch-instruction { text-align: center; margin-bottom: 25px; }
        .scratch-instruction h3 { font-size: 1.2rem; background: var(--glass); padding: 15px 30px; border-radius: var(--radius-full); border: 1px solid var(--glass-border); }

        .scratch-cards-container {
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 800px; width: 100%; transition: all 0.5s ease;
        }

        .scratch-card-new {
            width: 180px; height: 130px; position: relative; border-radius: var(--radius-lg); 
            cursor: pointer; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .scratch-card-new:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }

        /* The Revealed Image (White Background) */
        .img-revealed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1;
        }

        /* The Price Text over the white area */
        .scratch-result-text {
            position: absolute; bottom: 15%; left: 0; width: 100%; text-align: center;
            font-size: 2.2rem; font-weight: 800; color: #ef4444; z-index: 2; opacity: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2); transition: opacity 0.5s ease 1s;
        }

        /* The Unrevealed Image (Gray Background) */
        .img-unrevealed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 3;
            transition: all 1.5s ease-in-out;
        }

        /* State: Active (Scratched) */
        .scratch-cards-container.has-active { max-width: 900px; }
        
        .scratch-card-new.active {
            width: 320px; height: 230px; order: -1; margin-bottom: 20px; cursor: default;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.6);
        }
        .scratch-card-new.active:hover { transform: none; }

        /* The Slow Scratching Animation */
        .scratch-card-new.active .img-unrevealed {
            animation: scratchEffect 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .scratch-card-new.active .scratch-result-text { opacity: 1; }

        @keyframes scratchEffect {
            0% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); filter: blur(0); opacity: 1; }
            20% { clip-path: polygon(0 0, 80% 10%, 100% 100%, 20% 90%); }
            50% { clip-path: polygon(20% 0, 60% 30%, 80% 80%, 30% 60%); filter: blur(2px); opacity: 0.8;}
            80% { clip-path: polygon(40% 40%, 60% 40%, 60% 60%, 40% 60%); filter: blur(5px); opacity: 0.4; transform: scale(1.1); }
            100% { clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%); filter: blur(10px); opacity: 0; transform: scale(1.2); display: none; }
        }

        /* State: Disabled (Other Cards) */
        .scratch-card-new.disabled {
            width: 120px; height: 85px; opacity: 0.5; filter: grayscale(80%); pointer-events: none; margin: 0 5px;
        }

        /* TEMPORARY RESET BUTTON */
        .temp-reset-btn {
            margin-top: 20px; padding: 12px 30px; background: var(--danger); color: white;
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transition: 0.3s;
        }
        .temp-reset-btn:hover { background: #dc2626; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .scratch-card-new { width: 140px; height: 100px; }
            .scratch-card-new.active { width: 280px; height: 200px; }
            .scratch-result-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div id="app-wrapper">
        <div class="header-section">
            <div class="header-left">
                <!-- 📌 LOGO IMAGE UPDATED HERE -->
                <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/dsc_logo.png" alt="DSC Logo" class="logo-img">
                <div class="title-group">
                    <h1 class="main-title">Daily Saving Challenge</h1>
                    <p class="sub-heading" style="color:var(--text-secondary)">දිනපතා මුදල් ඉතිරි කිරීමේ අභියෝගය</p>
                </div>
            </div>
        </div>

        <div class="user-greeting">
            <h2>Hi, <span id="displayUserName" style="color:var(--accent)">User</span> 👋</h2>
        </div>

        <div class="live-total-container">
            <div class="live-total">
                <i class="fas fa-piggy-bank" style="color:var(--accent)"></i>
                <span>අද ඉතුරු කරමු:</span>
                <span class="amount" id="liveAmount">Rs. 0</span>
            </div>
        </div>

        <!-- 📌 SCRATCH CARDS SECTION -->
        <div class="scratch-section">
            <div class="scratch-instruction" id="scratchInstruction">
                <h3>අද දවසේ ඉතුරු කරන්න ඕන මුදල දැනගැනීමට කාඩ් එකක් සූරලා බලන්න</h3>
            </div>
            
            <div class="scratch-cards-container" id="scratchCardsContainer">
                
                <!-- Card 1 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <!-- Card 2 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <!-- Card 3 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <!-- Card 4 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <!-- Card 5 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <!-- Card 6 -->
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
            </div>

            <!-- Temporary Reset Button -->
            <button id="tempResetBtn" class="temp-reset-btn" onclick="resetCards()">Reset Cards (Temp)</button>
        </div>

    </div>

    <script>
        // 📌 SCRATCH CARD LOGIC
        function scratchCard(clickedCard) {
            
            // "දිනකට එකයි" සීමාව දැනට Testing සඳහා අක්‍රිය කර ඇත
            
            // Generate Random Amount: Multiple of 10, between 100 and 990
            const randomMultiplier = Math.floor(Math.random() * 90);
            const total = (randomMultiplier * 10) + 100; 

            const container = document.getElementById('scratchCardsContainer');
            const allCards = container.querySelectorAll('.scratch-card-new');

            container.classList.add('has-active');
            
            allCards.forEach(card => {
                if (card === clickedCard) {
                    card.classList.add('active');
                    card.querySelector('.scratch-result-text').innerText = `Rs. ${total}`;
                } else {
                    card.classList.add('disabled');
                }
            });

            document.getElementById('liveAmount').innerText = `Rs. ${total}`;

            // Show temporary reset button after scratching
            setTimeout(() => {
                document.getElementById('tempResetBtn').style.display = 'inline-block';
            }, 2000); 
        }

        // 📌 TEMPORARY RESET FUNCTION
        function resetCards() {
            const container = document.getElementById('scratchCardsContainer');
            const allCards = container.querySelectorAll('.scratch-card-new');

            container.classList.remove('has-active');

            allCards.forEach(card => {
                card.classList.remove('active', 'disabled');
                card.querySelector('.scratch-result-text').innerText = '';
                
                // Hack to reset CSS animation on the unrevealed image
                const unrevealedImg = card.querySelector('.img-unrevealed');
                unrevealedImg.style.animation = 'none';
                unrevealedImg.offsetHeight; /* trigger reflow */
                unrevealedImg.style.animation = null; 
            });

            document.getElementById('liveAmount').innerText = `Rs. 0`;
            document.getElementById('tempResetBtn').style.display = 'none';
        }
    </script>
</body>
</html>
