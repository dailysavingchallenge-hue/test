<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දිනපතා ඉතිරුම් අභියෝගය | Daily Saving Challenge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 📌 Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --primary-dark: #4f46e5;
            --secondary: #ec4899; --accent: #f59e0b; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a;
            --dark-light: #1e293b; --dark-lighter: #334155;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc; --text-secondary: #cbd5e1; --text-muted: #94a3b8;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Sinhala', 'Poppins', sans-serif;
            background: var(--dark); color: var(--text-primary);
            min-height: 100vh; overflow-x: hidden; line-height: 1.6;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 1) 100%);
        }

        #app-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        /* HEADER */
        .header-section { padding: 30px 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.1); }
        .main-title { font-size: clamp(1.2rem, 4vw, 2.8rem); font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--secondary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* LIVE TOTAL */
        .live-total-container { display: flex; justify-content: center; margin-bottom: 40px; }
        .live-total { display: inline-flex; align-items: center; gap: 15px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--glass-border); padding: 20px 40px; border-radius: var(--radius-full); font-size: 1.8rem; font-weight: 700; backdrop-filter: blur(20px); }
        .live-total .amount { color: var(--accent); transition: all 0.3s ease; }

        /* 📌 SCRATCH CARDS SECTION */
        .scratch-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
        .scratch-instruction { text-align: center; margin-bottom: 25px; z-index: 20; position: relative; }
        .scratch-instruction h3 { font-size: 1.2rem; background: var(--glass); padding: 15px 30px; border-radius: var(--radius-full); border: 1px solid var(--glass-border); }

        .scratch-cards-container {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; 
            max-width: 800px; width: 100%; position: relative; min-height: 350px;
            align-items: center;
        }

        /* Card Setup: Removed box styling, added pure drop-shadow for PNG outline */
        .scratch-card-new {
            width: 180px; height: 140px; position: relative; 
            cursor: pointer; 
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.4)); /* Glow underneath the PNG only */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
            z-index: 2;
        }
        
        .scratch-card-new:hover { 
            transform: translateY(-5px); 
            filter: drop-shadow(0 15px 25px rgba(99, 102, 241, 0.5)); 
        }

        /* Images fitting perfectly without cutoff */
        .img-revealed, .img-unrevealed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; pointer-events: none;
        }
        
        .img-revealed { z-index: 1; }
        .img-unrevealed { z-index: 3; }

        /* The Price Text */
        .scratch-result-text {
            position: absolute; 
            bottom: 18%; /* Positioned on the white area */
            left: 50%; transform: translateX(-50%);
            width: 100%; text-align: center;
            font-size: 1.6rem; font-weight: 800; color: #ef4444; 
            z-index: 2; opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 📌 NEW WIPE ANIMATION */
        @keyframes cleanWipe {
            0% { clip-path: inset(0 0 0 0); filter: blur(0); }
            100% { clip-path: inset(0 0 0 100%); filter: blur(1px); }
        }

        /* TEMPORARY RESET BUTTON */
        .temp-reset-btn {
            margin-top: 30px; padding: 12px 30px; background: var(--danger); color: white;
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transition: 0.3s; position: relative; z-index: 20;
        }
        .temp-reset-btn:hover { background: #dc2626; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .scratch-card-new { width: 130px; height: 100px; }
            .scratch-result-text { font-size: 1.2rem; bottom: 15%; }
            .scratch-cards-container { min-height: 250px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div id="app-wrapper">
        <div class="header-section">
            <div class="header-left">
                <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/dsc_logo.png" alt="DSC Logo" class="logo-img">
                <div class="title-group">
                    <h1 class="main-title">Daily Saving Challenge</h1>
                    <p class="sub-heading" style="color:var(--text-secondary)">දිනපතා මුදල් ඉතිරි කිරීමේ අභියෝගය</p>
                </div>
            </div>
        </div>

        <div class="user-greeting">
            <h2>Hi, <span id="displayUserName" style="color:var(--accent)">User</span> 👋</h2>
        </div>

        <div class="live-total-container">
            <div class="live-total">
                <i class="fas fa-piggy-bank" style="color:var(--accent)"></i>
                <span>අද ඉතුරු කරමු:</span>
                <span class="amount" id="liveAmount">Rs. 0</span>
            </div>
        </div>

        <!-- 📌 SCRATCH CARDS SECTION -->
        <div class="scratch-section">
            <div class="scratch-instruction" id="scratchInstruction">
                <h3>අද දවසේ ඉතුරු කරන්න ඕන මුදල දැනගැනීමට කාඩ් එකක් සූරලා බලන්න</h3>
            </div>
            
            <div class="scratch-cards-container" id="scratchCardsContainer">
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
                <div class="scratch-card-new" onclick="scratchCard(this)">
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_on.png" class="img-revealed" alt="White Background">
                    <div class="scratch-result-text"></div>
                    <img src="https://raw.githubusercontent.com/dailysavingchallenge-hue/DSC/main/Scard_off.png" class="img-unrevealed" alt="Gray Cover">
                </div>
                
            </div>

            <!-- Temporary Reset Button -->
            <button id="tempResetBtn" class="temp-reset-btn" onclick="resetCards()">Reset Cards (Temp)</button>
        </div>

    </div>

    <script>
        let isAnimating = false;

        function scratchCard(clickedCard) {
            // Prevent multiple clicks during animation or if already scratched
            if (isAnimating || clickedCard.style.pointerEvents === 'none') return;
            isAnimating = true;

            const randomMultiplier = Math.floor(Math.random() * 90);
            const total = (randomMultiplier * 10) + 100; 

            const container = document.getElementById('scratchCardsContainer');
            const allCards = container.querySelectorAll('.scratch-card-new');
            
            // Calculate Center of Container
            const containerRect = container.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;

            // 1. Smoothly Move all cards (Active to Center & Enlarge, Others to Center & Shrink/Hide)
            allCards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardCenterX = rect.left + rect.width / 2;
                const cardCenterY = rect.top + rect.height / 2;
                
                // Calculate distance to move to the exact center
                const moveX = centerX - cardCenterX;
                const moveY = centerY - cardCenterY;

                card.style.pointerEvents = 'none'; // Disable hover/clicks

                if (card === clickedCard) {
                    // Main Card: Move to center, scale up, stay on top
                    card.querySelector('.scratch-result-text').innerText = `Rs. ${total}`;
                    card.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.6)`;
                    card.style.zIndex = '10';
                    card.style.filter = 'drop-shadow(0 0 30px rgba(245, 158, 11, 0.6))';
                } else {
                    // Other Cards: Move to center, scale down, hide under main card
                    card.style.transform = `translate(${moveX}px, ${moveY}px) scale(0.3)`;
                    card.style.opacity = '0';
                    card.style.zIndex = '1';
                }
            });

            // 2. Wait for cards to reach the center (800ms)
            setTimeout(() => {
                // Apply Wipe Animation to the Cover Image
                const cover = clickedCard.querySelector('.img-unrevealed');
                cover.style.animation = 'cleanWipe 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards';

                // 3. Wait for Wipe Animation to finish (1200ms) before showing Price & Total
                setTimeout(() => {
                    clickedCard.querySelector('.scratch-result-text').style.opacity = '1';
                    
                    // Update main total ONLY after price is fully revealed
                    document.getElementById('liveAmount').innerText = `Rs. ${total}`;
                    
                    document.getElementById('tempResetBtn').style.display = 'inline-block';
                    isAnimating = false;
                }, 1200);

            }, 800); 
        }

        // 📌 TEMPORARY RESET FUNCTION
        function resetCards() {
            if (isAnimating) return;
            
            const container = document.getElementById('scratchCardsContainer');
            const allCards = container.querySelectorAll('.scratch-card-new');

            allCards.forEach(card => {
                // Clear inline styles
                card.style.transform = '';
                card.style.zIndex = '';
                card.style.opacity = '';
                card.style.filter = '';
                card.style.pointerEvents = 'auto'; // Re-enable clicks
                
                // Reset Cover Image
                const cover = card.querySelector('.img-unrevealed');
                cover.style.animation = 'none';
                
                // Reset Text
                const textEl = card.querySelector('.scratch-result-text');
                textEl.style.opacity = '0';
                textEl.innerText = '';
            });

            document.getElementById('liveAmount').innerText = `Rs. 0`;
            document.getElementById('tempResetBtn').style.display = 'none';
        }
    </script>
</body>
</html>
